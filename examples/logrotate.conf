# Example logrotate config for restic-backup.sh's log file.
#
# Install at: /etc/logrotate.d/restic-backup
# (adjust the path below if you customized LOG_FILE in your .env)
#
# Apply/test with:
#   sudo logrotate -d /etc/logrotate.d/restic-backup   # dry run
#   sudo logrotate -f /etc/logrotate.d/restic-backup   # force a real rotation

/var/log/restic-backup.log {
    weekly
    rotate 4
    compress
    missingok
    notifempty

    # If logrotate refuses to rotate with an "insecure permissions"
    # error (common when /var/log or a custom log directory is
    # group-writable), tell it explicitly which user/group to act as
    # rather than loosening directory permissions system-wide.
    su root root
}
